upstream biltim_fe {
    server fe:3000;
}

upstream biltim_be {
    server be:1001;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location ~ ^/(v2|health|status|initiate|oauth|api|downloads) {
        proxy_pass http://biltim_be;
    }

    location ~ ^/(profiles|roles|companies|notifications|addresses|phones|audit_logs|board_meeting_decisions|five_s_[a-z_]+|user_[a-z]+|role_[a-z]+|verification[A-Za-z]+) {
        proxy_pass http://biltim_be;
    }

    location ~ ^/files(/|$) {
        proxy_pass http://biltim_be;
    }

    location / {
        proxy_pass http://biltim_fe;
    }
}
